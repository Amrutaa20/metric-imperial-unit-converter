<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div id="top">
            <h1>Metric / Imperial Unit Converter</h1>
            <input type="number" id="input-el"> <br>
            <button onclick="conversion()">Convert</button>
        </div>

        <div class="value">
            <h2>Length (Meter / Feet)</h2>
            <p id="length-el"></p>
        </div>

        <div class="value">
            <h2>Volume (Liter / Gallons)</h2>
            <p id="volume-el"></p>
        </div>

        <div class="value">
            <h2>Mass ( Kilograms / Pounds)</h2>
            <p id="mass-el"></p>
        </div>

        
        <script src="index.js"></script>
    </body>
</html>
